services:
  # 1. Frontend
  frontend:
    build:
      context: ./app-81mqyjlan9xd
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: always
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}

  # 2. Voice Bot
  voice-bot:
    build:
      context: ./miteshbot
      dockerfile: Dockerfile
    restart: always
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

  # 3. Automation Worker
  sync-worker:
    build:
      context: ./app-81mqyjlan9xd
      dockerfile: Dockerfile.worker
    restart: always
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
