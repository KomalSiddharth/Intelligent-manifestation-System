services:
  # 1. Frontend
  frontend:
    build:
      context: ./app-81mqyjlan9xd
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: always
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_API_URL=http://76.13.58.123:5000
      - VITE_SITE_URL=http://76.13.58.123:8080

  # 2. Voice Bot
  voice-bot-ai:
    build:
      context: ./miteshbot
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    restart: always
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

  # 3. Automation Worker
  sync-worker:
    build:
      context: ./app-81mqyjlan9xd
      dockerfile: Dockerfile.worker
    restart: always
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

  # 4. Omni-Channel Media Sync Worker (n8n companion)
  omni-sync-worker:
    build:
      context: ./miteshbot
      dockerfile: Dockerfile.omni
    ports:
      - "5001:5001"
    volumes:
      - ./miteshbot:/app
    restart: always
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
