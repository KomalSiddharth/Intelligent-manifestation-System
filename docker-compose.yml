services:
  # 1. Frontend
  frontend:
    build:
      context: ./app-81mqyjlan9xd
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: always
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_API_URL=http://76.13.58.123:5000
      - VITE_SITE_URL=http://76.13.58.123:8080

  # 2. Voice Bot
  voice-bot-ai:
    build:
      context: ./miteshbot
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    restart: always
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

  # 3. Automation Worker
  sync-worker:
    build:
      context: ./app-81mqyjlan9xd
      dockerfile: Dockerfile.worker
    restart: always
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

  # 4. Omni-Channel Media Sync Worker (n8n companion)
  omni-sync-worker:
    build:
      context: ./miteshbot
      dockerfile: Dockerfile.omni
    ports:
      - "5001:5001"
    volumes:
      - ./miteshbot:/app
    restart: always
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OMNI_SYNC_SECRET=${OMNI_SYNC_SECRET}

  # 5. n8n — orchestrates YouTube channel polling -> omni-sync-worker
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    restart: always
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://76.13.58.123:5678/
      - GENERIC_TIMEZONE=Asia/Kolkata
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
