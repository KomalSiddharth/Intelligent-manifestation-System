services:
  # Frontend — serves the pre-built React app via nginx on port 8080
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped

  # Sync Worker — automated Google Drive sync every 30 minutes
  sync-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    restart: unless-stopped
